name: Deploy

on:
  push:
    branches: [main]

# Required GitHub Secrets:
#   SSH_HOST: Server hostname or IP
#   SSH_USER: SSH user (root)
#   SSH_KEY: Private SSH key for server access
# Secrets are SOPS-encrypted in secrets.production.env.enc (decrypted on server via age key)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=__pycache__ \
            --exclude=.git \
            --exclude=.planning \
            --exclude=.env.production \
            --exclude='*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${SSH_USER}@${SSH_HOST}:/opt/3dez/"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Decrypt secrets and deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" \
            'cd /opt/3dez && sops decrypt --input-type dotenv --output-type dotenv secrets.production.env.enc > /dev/shm/.env.production && chmod 600 /dev/shm/.env.production && docker compose -f docker-compose.prod.yml up -d --build'
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Verify deployment
        run: |
          sleep 15
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" \
            'docker compose -f /opt/3dez/docker-compose.prod.yml ps --format "{{.Name}} {{.Status}}" | grep -q healthy'
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
